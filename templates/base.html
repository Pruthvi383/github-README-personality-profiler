<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}GitHub Personality Profiler{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              ink: '#0d1117',
              panel: '#161b22',
              line: '#30363d',
              muted: '#8b949e',
              accent: '#58a6ff',
              builder: '#2ea44f',
              fixer: '#f78166',
              experimenter: '#d2a8ff',
            },
            fontFamily: {
              display: ['Space Grotesk', 'sans-serif'],
              mono: ['IBM Plex Mono', 'monospace'],
            },
            boxShadow: {
              glow: '0 30px 80px rgba(88, 166, 255, 0.12)',
            },
          },
        },
      };
    </script>
    <style>
      body {
        background:
          radial-gradient(circle at top left, rgba(88, 166, 255, 0.18), transparent 28%),
          radial-gradient(circle at bottom right, rgba(210, 168, 255, 0.18), transparent 24%),
          #0d1117;
      }
      .glass {
        background: rgba(22, 27, 34, 0.78);
        backdrop-filter: blur(16px);
      }
    </style>
    {% block head %}{% endblock %}
  </head>
  <body class="min-h-screen text-white font-display">
    <div class="mx-auto max-w-7xl px-5 py-8 sm:px-8 lg:px-10">
      <header class="mb-10 flex flex-wrap items-center justify-between gap-4">
        <a href="/" class="inline-flex items-center gap-3 text-sm text-slate-200">
          <span class="rounded-full border border-line bg-white/5 px-3 py-1 font-mono text-xs uppercase tracking-[0.25em] text-accent">
            github-profiler.app
          </span>
          <span class="text-muted">Engineer archetypes from public GitHub activity</span>
        </a>
      </header>
      {% block content %}{% endblock %}
    </div>
    {% block scripts %}{% endblock %}
  </body>
</html>
